<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model CSS - Box Sizing Property </title>

    <style>
        *{
            margin: 0px;
            padding: 0px;
            /*Universal box-sizing > Include padding and border in the element's total width and height*/
            box-sizing: border-box;
            /*Use the box-sizing property to keep the width at 300px, no matter the amount of padding:*/
        }

        .maindiv{
            height: 100vh;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }


        .box1{
            width: 300px;
            height: 250px;
            padding: 50px;
            background-color: skyblue;
            border: solid 5px red;
        }
        .box2{
            width: 300px;
            height: 250px;
            padding: 15px;
            background-color: blue;
            border: solid 5px black;
        }
        .box3{
            width: 300px;
            height: 250px;
            padding: 100px;
            background-color: red;
            border: solid 5px green;
        }
        .box4{
            width: 300px;
            height: 250px;
            padding: 150px;
            background-color: yellow;
            border: solid 5px aqua;
        }
        


    </style>

</head>
<body>

    <section style="text-align: center; margin-top: 25px;">
        <h3>CSS Box Sizing: Width and Height of an Element</h3>
        <details>
            <summary>By default, the width and height of an element is calculated like this:</summary>
            <p>width + padding + border = actual width of an element</p>
            <p>height + padding + border = actual height of an element</p>
        </details>
    </section>

    <div class="maindiv">
        <div class="box1" title="content-box: The default value. The width and height properties only apply to the content of the element. If you add padding or borders, the element's actual rendered size will increase beyond the specified width and height">Box 1</div>
        <div class="box2" title="content-box: The default value. The width and height properties only apply to the content of the element. If you add padding or borders, the element's actual rendered size will increase beyond the specified width and height">Box 2</div>
        <div class="box3" title="content-box: The default value. The width and height properties only apply to the content of the element. If you add padding or borders, the element's actual rendered size will increase beyond the specified width and height">Box 3</div>
        <div class="box4" title="content-box: The default value. The width and height properties only apply to the content of the element. If you add padding or borders, the element's actual rendered size will increase beyond the specified width and height">Box 4</div>
    </div>



</body>
</html>
